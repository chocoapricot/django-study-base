{% extends 'common/_base.html' %}

{% block title %}通知詳細{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="card">
        <div class="card-header">
            <h4>{{ notification.title }}</h4>
            <small class="text-muted">{{ notification.created_at|date:"Y/m/d H:i" }}</small>
        </div>
        <div class="card-body">
            <p>{{ notification.message|linebreaksbr }}</p>
        </div>
        <div class="card-footer">
            <a href="{% url 'notification:notification_list' %}" class="btn btn-secondary">一覧に戻る</a>
        </div>
    </div>
</div>
{% endblock %}
